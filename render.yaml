services:
  - type: web
    name: slidemath-ws
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: node websocket.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        value: https://slidemath.at.ua/api
      - key: SERVER_API_KEY
        value: slidemath_ws_server_2026
